# ── Server 1: API Gateway (port 8080) ────────────────────────

upstream user_service     { server user-service:8000; }
upstream product_service  { server product-service:8000; }
upstream cart_service     { server cart-service:8000; }
upstream order_service    { server order-service:8000; }
upstream payment_service  { server payment-service:8000; }
upstream shipping_service { server shipping-service:8000; }
upstream ai_service       { server ai-service:8001; }
upstream frontend_app     { server frontend:3000; }

server {
    listen 8080;
    client_max_body_size 10M;

    # Re-resolve upstream DNS on every request (avoids 502 after container recreate)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── API routes (with CORS) ────────────────────────────────
    location /api/ {
        # CORS
        add_header Access-Control-Allow-Origin  $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # Routing
        location /api/auth/     { proxy_pass http://user_service;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/users/    { proxy_pass http://user_service;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/products/ { proxy_pass http://product_service;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/cart/     { proxy_pass http://cart_service;     proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/orders/   { proxy_pass http://order_service;    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/payment/  { proxy_pass http://payment_service;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/shipping/ { proxy_pass http://shipping_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/recommend { proxy_pass http://ai_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
        location /api/ai/       { proxy_pass http://ai_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

        # SSE streaming — must be before /api/chatbot plain route
        location /api/chatbot/stream {
            proxy_pass         http://ai_service;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Connection '';
            proxy_http_version 1.1;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding on;
        }
        location /api/chatbot { proxy_pass http://ai_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    }

    # ── Frontend (SPA fallback — no CORS needed) ──────────────
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ── Server 2: phpMyAdmin qua FastCGI (port 8081) ─────────────

server {
    listen 8081;
    root /var/www/html;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass   phpmyadmin:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
